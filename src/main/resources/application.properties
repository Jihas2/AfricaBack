# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ─── Database ────────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/residence_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ─── Flyway ──────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ─── JWT ─────────────────────────────────────────────────────────────────────
# IMPORTANT: replace this secret with a strong random value in production (min 32 chars)
app.jwt.secret=${APP_JWT_SECRET:romeogolf-residence-super-secret-key-2025-replace-in-prod!!}
app.jwt.expiration-ms=86400000

# ─── Upload ──────────────────────────────────────────────────────────────────
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Jackson ─────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false

# ─── CORS ────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ─── URLs ────────────────────────────────────────────────────────────────────
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}
app.backend-url=${APP_BACKEND_URL:http://localhost:8080}

# ─── Stripe ──────────────────────────────────────────────────────────────────
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

# ─── PayPal ──────────────────────────────────────────────────────────────────
paypal.client-id=${PAYPAL_CLIENT_ID:paypal_client_placeholder}
paypal.client-secret=${PAYPAL_CLIENT_SECRET:paypal_secret_placeholder}
paypal.mode=${PAYPAL_MODE:sandbox}

# ─── CinetPay ────────────────────────────────────────────────────────────────
cinetpay.api-key=${CINETPAY_API_KEY:cinetpay_key_placeholder}
cinetpay.site-id=${CINETPAY_SITE_ID:cinetpay_site_placeholder}

# ─── Bank Transfer (Virement) ─────────────────────────────────────────────────
app.bank.account-name=${BANK_ACCOUNT_NAME:Résidence Romeo Golf}
app.bank.account-number=${BANK_ACCOUNT_NUMBER:CD 00000 00000 00000000000 00}
app.bank.bank-name=${BANK_NAME:Rawbank}
app.bank.swift=${BANK_SWIFT:RAWBCDKI}
