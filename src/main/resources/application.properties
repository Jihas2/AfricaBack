# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ─── Database ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/residence_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ─── Flyway ──────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ─── JWT ─────────────────────────────────────────────────────────────────────
# IMPORTANT: replace this secret with a strong random value in production (min 32 chars)
app.jwt.secret=romeogolf-residence-super-secret-key-2025-replace-in-prod!!
app.jwt.expiration-ms=86400000

# ─── Upload ──────────────────────────────────────────────────────────────────
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── CORS ────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000
